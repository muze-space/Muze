<div class="search-section">
  <form class="search" role="search" (submit)="$event.preventDefault()">
    <input [value]="query" (input)="onInput($event)" id="header-search" class="search__input" type="search" placeholder="Search…" name="query" />
    <button class="search__button" type="submit">Find</button>
  </form>
  @if (isResultsWindowOpen()) {
  <ul class="dropdown">
    @for (track of suggestions(); track track.id) {
    <app-track-item [track]="track" [isSearchVersion]="true"></app-track-item>
    }
  </ul>
  }
</div>
