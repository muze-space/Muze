<h2>Popular tracks</h2>
<app-tracks [order]="trackOrder.PopularityTotal"></app-tracks>
<h2>New Releases</h2>
<app-tracks [order]="trackOrder.ReleaseDateDesc"></app-tracks>
<h2>Genre Tags</h2>
<ul>
  @for(genre of genres; track genre.value) {
  <li (click)="onGenreClick(genre.value)" (keydown.enter)="onGenreClick(genre.value)" tabindex="0">{{ genre.label }}</li>
  }
</ul>
