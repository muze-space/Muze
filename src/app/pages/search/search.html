<h2>Search</h2>

@if (error()) {
  <div class="error-message" role="alert">{{ error() }}</div>
} @else {
  <p>{{ tracksCount() }} results</p>

  @if (isLoading()) {
    <p class="loading">Loading tracks…</p>
  } @else {
    <ul>
      @for (track of tracks(); track track.id) {
        <li>{{ track.name }}</li>
      }
    </ul>
  }
}
